<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tetris</title>
  <link rel="stylesheet" href="style.css" />
  <script>
    (function () {
      if (localStorage.getItem('tetris-theme') === 'light') {
        document.documentElement.setAttribute('data-theme', 'light');
      }
    })();
  </script>
</head>
<body>
  <div class="wrapper">
    <div class="header-row">
      <h1 class="game-title">TETRIS</h1>
      <button id="theme-toggle" aria-label="Cambiar tema Dark/Light" title="Cambiar tema Dark/Light"></button>
    </div>
    <div class="game-container">
      <canvas id="board" width="300" height="600"></canvas>

      <aside class="panel">
        <div class="panel-section">
          <span class="label">SCORE</span>
          <span class="value" id="score">0</span>
        </div>
        <div class="panel-section">
          <span class="label">LINES</span>
          <span class="value" id="lines">0</span>
        </div>
        <div class="panel-section">
          <span class="label">LEVEL</span>
          <span class="value" id="level">1</span>
        </div>

        <div class="panel-section">
          <span class="label">COMBO</span>
          <span class="value" id="combo">0</span>
        </div>

        <div class="panel-section">
          <span class="label">NEXT</span>
          <canvas id="next-canvas" width="120" height="120"></canvas>
        </div>

        <div class="panel-section controls">
          <span class="label">CONTROLS</span>
          <ul>
            <li><kbd>←</kbd><kbd>→</kbd> mover</li>
            <li><kbd>↑</kbd> rotar</li>
            <li><kbd>↓</kbd> bajar</li>
            <li><kbd>Space</kbd> caída</li>
            <li><kbd>P</kbd> pausa</li>
          </ul>
        </div>
      </aside>
    </div>

    <div id="overlay" class="overlay hidden">
      <div class="overlay-box">
        <p id="overlay-title">GAME OVER</p>
        <p id="overlay-score"></p>

        <div id="name-entry" class="name-entry hidden">
          <label for="name-input" class="label">¡Nuevo récord! Nombre</label>
          <input type="text" id="name-input" maxlength="12" placeholder="Jugador" autocomplete="off" />
          <button id="name-submit-btn">Guardar</button>
        </div>

        <div id="records-table-gameover" class="records-container"></div>

        <button id="restart-btn">Reiniciar</button>
      </div>
    </div>

    <div id="start-screen" class="overlay hidden">
      <div class="overlay-box">
        <p id="start-title" class="start-title">RÉCORDS</p>
        <div id="records-table-start" class="records-container"></div>
        <div class="start-stats">
          <div class="panel-section">
            <span class="label">MEJOR COMBO</span>
            <span class="value" id="best-combo-start">0</span>
          </div>
          <div class="panel-section">
            <span class="label">LÍNEAS MÁXIMAS</span>
            <span class="value" id="max-lines-start">0</span>
          </div>
        </div>
        <button id="start-btn">Jugar</button>
        <button id="reset-records-btn" class="reset-records-btn">Resetear récords</button>
      </div>
    </div>
  </div>

  <script src="game.js"></script>
</body>
</html>
